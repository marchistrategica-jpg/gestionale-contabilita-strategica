<!-- ============================================================
     MODULO: Incassi & Pagamenti
     Questo file viene iniettato nel main-content da router.js.
     NON è una pagina completa — non ha <html>, <head>, <body>.
     ============================================================ -->

<!-- ── KPI CARDS ─────────────────────────────────────────── -->
<div class="kpi-grid" id="kpi-grid">
  <div class="kpi-card green">
    <div class="kpi-label">Incassi mese</div>
    <div class="kpi-value" id="kpi-incassi-mese">—</div>
    <div class="kpi-sub" id="kpi-incassi-mese-sub">caricamento...</div>
  </div>
  <div class="kpi-card red">
    <div class="kpi-label">Pagamenti mese</div>
    <div class="kpi-value" id="kpi-pagamenti-mese">—</div>
    <div class="kpi-sub" id="kpi-pagamenti-mese-sub">caricamento...</div>
  </div>
  <div class="kpi-card secondary">
    <div class="kpi-label">Saldo netto mese</div>
    <div class="kpi-value" id="kpi-saldo-netto">—</div>
    <div class="kpi-sub">incassi - pagamenti</div>
  </div>
  <div class="kpi-card primary">
    <div class="kpi-label">Incassi YTD</div>
    <div class="kpi-value" id="kpi-incassi-ytd">—</div>
    <div class="kpi-sub" id="kpi-incassi-ytd-sub">anno corrente</div>
  </div>
</div>

<!-- ── TABELLA MOVIMENTI ──────────────────────────────────── -->
<div class="table-wrap">

  <!-- Intestazione tabella con filtri -->
  <div class="table-head">
    <div class="flex-center gap-8" style="flex-wrap:wrap;gap:8px;">

      <!-- Ricerca testo -->
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" class="search-input" id="cerca-input" placeholder="Cerca descrizione, categoria...">
      </div>

      <!-- Chip tipo: Tutti / Incassi / Pagamenti -->
      <div class="flex-center gap-8" id="chip-tipo" style="gap:4px;">
        <button class="btn btn-secondary btn-sm chip-btn active" data-tipo="tutti">Tutti</button>
        <button class="btn btn-secondary btn-sm chip-btn" data-tipo="incasso">Incassi</button>
        <button class="btn btn-secondary btn-sm chip-btn" data-tipo="pagamento">Pagamenti</button>
      </div>

      <!-- Selettore mese e anno -->
      <div class="flex-center" style="gap:6px;">
        <select class="form-control" id="filtro-mese" style="width:auto;padding:6px 10px;font-size:12px;">
          <option value="1">Gennaio</option>
          <option value="2">Febbraio</option>
          <option value="3">Marzo</option>
          <option value="4">Aprile</option>
          <option value="5">Maggio</option>
          <option value="6">Giugno</option>
          <option value="7">Luglio</option>
          <option value="8">Agosto</option>
          <option value="9">Settembre</option>
          <option value="10">Ottobre</option>
          <option value="11">Novembre</option>
          <option value="12">Dicembre</option>
        </select>
        <select class="form-control" id="filtro-anno" style="width:auto;padding:6px 10px;font-size:12px;">
          <!-- Anni popolati da JS -->
        </select>
      </div>

    </div>

    <!-- Azioni destra -->
    <div class="flex-center gap-8">
      <button class="btn btn-secondary btn-sm" id="btn-export-csv">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Esporta CSV
      </button>
      <button class="btn btn-primary btn-sm" id="btn-nuovo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Nuovo movimento
      </button>
    </div>
  </div>

  <!-- Tabella -->
  <div id="tabella-wrap">
    <div class="loading">
      <div class="spinner"></div>
      Caricamento movimenti...
    </div>
  </div>

</div><!-- /.table-wrap -->


<!-- ── MODAL: NUOVO / MODIFICA MOVIMENTO ─────────────────── -->
<div class="modal-overlay" id="modal-movimento">
  <div class="modal">

    <div class="modal-header">
      <span class="modal-title" id="modal-titolo">Nuovo movimento</span>
      <button class="modal-close" id="modal-close-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <!-- ID movimento (nascosto, usato in modifica) -->
      <input type="hidden" id="mov-id">

      <!-- Tipo: Incasso / Pagamento -->
      <div class="form-group">
        <label class="form-label">Tipo *</label>
        <div class="flex-center" style="gap:8px;">
          <button type="button" class="btn btn-success btn-sm tipo-btn active" data-val="incasso" id="tipo-incasso">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            Incasso
          </button>
          <button type="button" class="btn btn-danger btn-sm tipo-btn" data-val="pagamento" id="tipo-pagamento">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            Pagamento
          </button>
        </div>
        <input type="hidden" id="mov-tipo" value="incasso">
      </div>

      <div class="form-row">
        <!-- Data -->
        <div class="form-group">
          <label class="form-label">Data *</label>
          <input type="date" class="form-control" id="mov-data">
        </div>
        <!-- Categoria -->
        <div class="form-group">
          <label class="form-label">Categoria *</label>
          <select class="form-control" id="mov-categoria">
            <option value="">Seleziona...</option>
            <option>Contratto</option>
            <option>Consulenza</option>
            <option>Affitto</option>
            <option>Stipendi</option>
            <option>Fornitori</option>
            <option>Utenze</option>
            <option>Tasse</option>
            <option>Provvigioni</option>
            <option>Altro</option>
          </select>
        </div>
      </div>

      <!-- Descrizione -->
      <div class="form-group">
        <label class="form-label">Descrizione *</label>
        <input type="text" class="form-control" id="mov-descrizione" placeholder="es. Fattura cliente XYZ">
      </div>

      <div class="form-row">
        <!-- Importo (al netto IVA) -->
        <div class="form-group">
          <label class="form-label">Importo netto (€) *</label>
          <input type="number" class="form-control" id="mov-importo" placeholder="0.00" min="0" step="0.01">
        </div>
        <!-- Aliquota IVA -->
        <div class="form-group">
          <label class="form-label">Aliquota IVA (%)</label>
          <select class="form-control" id="mov-iva-rate">
            <option value="0">0% (esente)</option>
            <option value="4">4%</option>
            <option value="10">10%</option>
            <option value="22" selected>22%</option>
          </select>
        </div>
      </div>

      <!-- IVA calcolata — solo visualizzazione -->
      <div class="form-group">
        <label class="form-label">Importo IVA (calcolato automaticamente)</label>
        <div style="padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);font-size:13px;font-weight:600;color:var(--text0);" id="mov-iva-display">€ 0,00</div>
      </div>

      <div class="form-row">
        <!-- Conto -->
        <div class="form-group">
          <label class="form-label">Conto</label>
          <input type="text" class="form-control" id="mov-conto" placeholder="es. Conto corrente BNL">
        </div>
        <!-- Contratto collegato -->
        <div class="form-group">
          <label class="form-label">Contratto collegato</label>
          <select class="form-control" id="mov-contratto-ref">
            <option value="">Nessuno</option>
            <!-- Popolato da JS con contratti da Firestore -->
          </select>
        </div>
      </div>

      <!-- Note -->
      <div class="form-group">
        <label class="form-label">Note</label>
        <textarea class="form-control" id="mov-note" rows="2" placeholder="Note aggiuntive..."></textarea>
      </div>

    </div><!-- /.modal-body -->

    <div class="modal-footer">
      <button class="btn btn-secondary" id="btn-annulla">Annulla</button>
      <button class="btn btn-primary" id="btn-salva">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Salva
      </button>
    </div>

  </div><!-- /.modal -->
</div><!-- /.modal-overlay -->
