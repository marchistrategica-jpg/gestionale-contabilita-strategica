<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Reset Database — Strategica MNS</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: monospace; background: #0f507b; color: #fff; padding: 40px; max-width: 700px; margin: auto; }
    h1 { color: #e6165c; font-size: 1.4rem; margin-bottom: 6px; }
    p  { color: #8fa3b8; margin-bottom: 10px; }
    .avviso { background: rgba(230,22,92,0.15); border: 1px solid #e6165c; border-radius: 8px; padding: 14px 18px; margin-bottom: 24px; color: #fff; line-height: 1.7; }
    .avviso strong { color: #e6165c; }
    #log { background: #1b3050; border-radius: 8px; padding: 20px; line-height: 1.9; }
    .ok  { color: #10b981; }
    .err { color: #f87171; }
    .inf { color: #fbbf24; }
    button { background: #e6165c; color: #fff; border: none; border-radius: 8px;
             padding: 14px 32px; font-size: 1rem; cursor: pointer; margin-bottom: 20px; }
    button:hover { background: #c4104d; }
    button:disabled { background: #4a6380; cursor: not-allowed; }
  </style>
</head>
<body>

<h1>🗑️ Reset Database — Strategica MNS</h1>

<div class="avviso">
  <strong>⚠️ Attenzione:</strong> questo strumento elimina i dati di test dal database.<br>
  ✅ <strong>Mantiene intatta</strong> la collezione <strong>soci</strong><br>
  🗑️ <strong>Elimina tutto</strong> il contenuto di: contratti, movimenti, conti, costi, provvigioni, compensi
</div>

<button id="btnReset" onclick="runReset()">▶ Avvia Reset</button>

<div id="log">Premi il bottone per iniziare...</div>

<script>
// ════════════ CREDENZIALI FIREBASE ════════════
const firebaseConfig = {
  apiKey:            "AIzaSyDxwnqouHo_t8mNaOGQDEqbcRdd-Buvi5w",
  authDomain:        "strategica-mns.firebaseapp.com",
  projectId:         "strategica-mns",
  storageBucket:     "strategica-mns.firebasestorage.app",
  messagingSenderId: "546507455703",
  appId:             "1:546507455703:web:3a8ac23a6b90853e2d4492"
};
// ══════════════════════════════════════════════

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Utility: scrivi nel log a schermo
const log = document.getElementById('log');
function msg(text, tipo = 'ok') {
  const riga = document.createElement('div');
  riga.className = tipo;
  riga.textContent = text;
  log.appendChild(riga);
  log.scrollTop = log.scrollHeight;
}

// Collezioni da svuotare (soci NON è in questo elenco)
const COLLEZIONI = [
  'contratti',
  'movimenti',
  'conti',
  'costi',
  'provvigioni',
  'compensi'
];

// Svuota una singola collezione documento per documento
async function svuotaCollezione(nome) {
  const snapshot = await db.collection(nome).get();

  if (snapshot.empty) {
    msg(`   ⚪ ${nome} — già vuota`, 'inf');
    return 0;
  }

  let count = 0;
  // Elimina in batch da 499 (limite Firebase)
  const docs = snapshot.docs;
  for (let i = 0; i < docs.length; i += 499) {
    const batch = db.batch();
    docs.slice(i, i + 499).forEach(doc => batch.delete(doc.ref));
    await batch.commit();
    count += Math.min(499, docs.length - i);
  }

  msg(`   🗑️  ${nome} — eliminati ${count} documenti`, 'ok');
  return count;
}

async function runReset() {
  const btn = document.getElementById('btnReset');
  btn.disabled = true;
  log.innerHTML = '';

  msg('🔄 Avvio reset database...', 'inf');
  msg('   La collezione "soci" verrà mantenuta intatta.', 'inf');
  msg('', 'inf');

  let totaleOk = 0;
  let totaleErr = 0;

  for (const collezione of COLLEZIONI) {
    try {
      const n = await svuotaCollezione(collezione);
      totaleOk += n;
    } catch (e) {
      msg(`   ✖ Errore su ${collezione}: ${e.message}`, 'err');
      totaleErr++;
    }
  }

  msg('', 'inf');
  msg('════════════════════════════════════', 'inf');

  if (totaleErr === 0) {
    msg(`✅ COMPLETATO! ${totaleOk} documenti eliminati.`, 'ok');
    msg(`   Collezione "soci": intatta 👍`, 'ok');
    msg(`   Il gestionale è pronto per i dati reali.`, 'ok');
  } else {
    msg(`⚠️  Completato con ${totaleErr} errori. Controlla le credenziali Firebase.`, 'err');
  }

  btn.textContent = '✅ Reset completato';
}
</script>
</body>
</html>
