// FUNZIONE SEED

async function runSeed() {
  const btn = document.getElementById('btnSeed');
  btn.disabled = true;
  log.innerHTML = '';

  msg('🚀 Inizio seed database...', 'inf');

  const sezioni = [
    { nome: 'soci',        dati: SOCI },
    { nome: 'conti',       dati: CONTI },
    { nome: 'contratti',   dati: CONTRATTI },
    { nome: 'movimenti',   dati: MOVIMENTI },
    { nome: 'costi',       dati: COSTI },
    { nome: 'provvigioni', dati: PROVVIGIONI },
    { nome: 'compensi',    dati: COMPENSI },
  ];

  let totaleOk = 0;
  let totaleErr = 0;

  for (const sezione of sezioni) {
    msg(`\n📂 Collezione: ${sezione.nome} (${sezione.dati.length} documenti)`, 'inf');
    for (const item of sezione.dati) {
      try {
        await db.collection(sezione.nome).doc(item.id).set(item);
        msg(`   ✔ ${item.id}`, 'ok');
        totaleOk++;
      } catch (e) {
        msg(`   ✖ ${item.id} — ${e.message}`, 'err');
        totaleErr++;
      }
    }
  }

  msg(`\n════════════════════════════════════`, 'inf');
  if (totaleErr === 0) {
    msg(`✅ COMPLETATO! ${totaleOk} documenti inseriti con successo.`, 'ok');
    msg(`Puoi chiudere questa pagina e aprire il gestionale.`, 'ok');
  } else {
    msg(`⚠️  ${totaleOk} ok, ${totaleErr} errori. Controlla le credenziali Firebase.`, 'err');
  }

  btn.textContent = '✅ Seed completato';
}
